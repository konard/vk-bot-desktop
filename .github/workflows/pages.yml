name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site
        run: npm run build:site

      - name: Install browser e2e dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm install --no-save --package-lock=false --no-audit --no-fund browser-commander@0.8.0 playwright@1.59.1

      - name: Install Chromium for browser e2e tests
        run: npx playwright install chromium

      - name: Test built Pages site before deploy
        run: npm run test:pages:e2e -- --site-dir site/dist

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: Deploy Pages site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Install browser e2e dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm install --no-save --package-lock=false --no-audit --no-fund browser-commander@0.8.0 playwright@1.59.1

      - name: Install Chromium for browser e2e tests
        run: npx playwright install chromium

      - name: Test published Pages site after deploy
        run: npm run test:pages:e2e -- --url "${{ steps.deployment.outputs.page_url }}"
